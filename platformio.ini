[platformio]
default_envs = waveshare_esp32s3_usb_msc

[env]
platform = espressif32@6.3.2
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1

[env:waveshare_esp32s3]
build_flags =
  ${env.build_flags}
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:waveshare_esp32s3_usb_msc]
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

# ESP32-C6 needs Arduino-ESP32 v3+, which the official espressif32 platform ships
# only in recent releases. The pioarduino fork tracks arduino-esp32 v3 closely.
[env:waveshare_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-n8
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_USB_TRANSFER_ENABLED=0
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=0
  ; ESP32-C6 has 512 KB on-chip SRAM and no PSRAM, so cap loaded books to fit
  ; in heap. Each Arduino `String` word costs ~30-40 B (object + heap-block
  ; overhead + payload), and free heap after framework boot is ~270 KB. 6000
  ; words ≈ 200 KB, leaving headroom for SPI/SD buffers, the framebuffer, and
  ; UI state.
  -DRSVP_MAX_BOOK_WORDS=6000

[env:native_test]
platform = native
framework =
test_framework = unity
test_filter = test_pacing
test_build_src = yes
build_src_filter = -<*> +<reader/ReadingLoop.cpp>
build_flags =
  -std=c++17
  -Itest/support
  -Isrc
