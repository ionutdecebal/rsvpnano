[platformio]
default_envs = waveshare_esp32s3_usb_msc

[common]
base_build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1
  -std=gnu++17
  -fno-exceptions
  -fno-rtti

base_build_unflags =
  -std=gnu++11

base_src_filter =
  +<*>
  -<benchmark/**>
  -<platforms/**>
  -<drivers/audio/**>
  -<drivers/display/**>
  -<drivers/gpio/**>
  -<drivers/imu/**>
  -<drivers/power/**>
  -<drivers/touch/**>

lcd_349_src_filter =
  ${common.base_src_filter}
  +<platforms/waveshare_lcd_349/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/axs15231b/**>
  +<drivers/gpio/tca9554/**>
  +<drivers/imu/qmi8658/**>
  +<drivers/touch/axs15231b_touch/**>

amoled_241_src_filter =
  ${common.base_src_filter}
  +<platforms/waveshare_amoled_241/**>
  +<drivers/display/rm690b0/**>
  +<drivers/gpio/tca9554/**>
  +<drivers/imu/qmi8658/**>
  +<drivers/touch/ft6336/**>

amoled_18_v1_src_filter =
  ${common.base_src_filter}
  +<platforms/waveshare_amoled_18/*.cpp>
  +<platforms/waveshare_amoled_18/v1/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/sh8601/**>
  +<drivers/gpio/tca9554/**>
  +<drivers/imu/qmi8658/**>
  +<drivers/touch/ft6336/**>
  +<drivers/power/axp2101/**>

amoled_18_v2_src_filter =
  ${common.base_src_filter}
  +<platforms/waveshare_amoled_18/*.cpp>
  +<platforms/waveshare_amoled_18/v2/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/co5300/**>
  +<drivers/gpio/tca9554/**>
  +<drivers/imu/qmi8658/**>
  +<drivers/touch/cst92xx/**>
  +<drivers/power/axp2101/**>

amoled_206_src_filter =
  ${common.base_src_filter}
  +<platforms/waveshare_amoled_206/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/co5300/**>
  +<drivers/imu/qmi8658/**>
  +<drivers/touch/ft6336/**>
  +<drivers/power/axp2101/**>

amoled_216_src_filter =
  ${common.base_src_filter}
  +<platforms/waveshare_amoled_216/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/co5300/**>
  +<drivers/imu/qmi8658/**>
  +<drivers/touch/cst92xx/**>
  +<drivers/power/axp2101/**>

c6_touch_lcd_147_src_filter =
  ${common.base_src_filter}
  +<platforms/waveshare_c6_touch_lcd_147/**>
  +<drivers/display/jd9853/**>
  +<drivers/imu/qmi8658/**>
  +<drivers/touch/axs5106/**>

usb_msc_build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_USB_TRANSFER_ENABLED=1

usb_msc_build_unflags =
  -DARDUINO_USB_MODE=1

benchmark_build_flags =
  -DRSVP_BENCHMARK_MODE=1

benchmark_monitor_filters =
  default
  time
  log2file
  esp32_exception_decoder

[env]
platform = espressif32@6.3.2
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/pio_set_version.py

build_flags =
  ${common.base_build_flags}

build_unflags =
  ${common.base_build_unflags}

build_src_filter =
  ${common.base_src_filter}

;
; Waveshare 3.49 LCD, rev1
;
[env:waveshare_esp32s3]
build_src_filter =
  ${common.lcd_349_src_filter}

build_flags =
  ${env.build_flags}
  -DRSVP_LCD_349_REVISION_HEADER=\"platforms/waveshare_lcd_349/rev1/WaveshareLcd349Revision.h\"
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_lcd_349/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=0

;
; Waveshare 3.49 LCD, rev2
;
[env:waveshare_esp32s3_rev2]
build_src_filter =
  ${common.lcd_349_src_filter}

build_flags =
  ${env.build_flags}
  -DRSVP_LCD_349_REVISION_HEADER=\"platforms/waveshare_lcd_349/rev2/WaveshareLcd349Revision.h\"
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_lcd_349/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=0

;
; Waveshare 3.49 LCD, rev1, USB MSC
;
[env:waveshare_esp32s3_usb_msc]
build_src_filter =
  ${common.lcd_349_src_filter}

build_flags =
  ${env.build_flags}
  ${common.usb_msc_build_flags}
  -DRSVP_LCD_349_REVISION_HEADER=\"platforms/waveshare_lcd_349/rev1/WaveshareLcd349Revision.h\"
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_lcd_349/BoardConfig.h\"

build_unflags =
  ${env.build_unflags}
  ${common.usb_msc_build_unflags}

;
; Waveshare 3.49 LCD, rev2, USB MSC
;
[env:waveshare_esp32s3_usb_msc_rev2]
build_src_filter =
  ${common.lcd_349_src_filter}

build_flags =
  ${env.build_flags}
  ${common.usb_msc_build_flags}
  -DRSVP_LCD_349_REVISION_HEADER=\"platforms/waveshare_lcd_349/rev2/WaveshareLcd349Revision.h\"
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_lcd_349/BoardConfig.h\"

build_unflags =
  ${env.build_unflags}
  ${common.usb_msc_build_unflags}

;
; Waveshare 2.41 AMOLED
;
[env:waveshare_esp32s3_touch_amoled_241]
build_src_filter =
  ${common.amoled_241_src_filter}

build_flags =
  ${env.build_flags}
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_241/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=0

;
; Waveshare 1.8 AMOLED v1
;
[env:waveshare_esp32s3_touch_amoled_18_v1]
build_src_filter =
  ${common.amoled_18_v1_src_filter}

build_flags =
  ${env.build_flags}
  ${common.usb_msc_build_flags}
  -DRSVP_AMOLED_18_VERSION_HEADER=\"platforms/waveshare_amoled_18/v1/WaveshareAmoled18Version.h\"
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_18/BoardConfig.h\"

build_unflags =
  ${env.build_unflags}
  ${common.usb_msc_build_unflags}

;
; Backward-compatible alias for the AMOLED 1.8 v1 target.
;
[env:waveshare_esp32s3_touch_amoled_18]
extends = env:waveshare_esp32s3_touch_amoled_18_v1

;
; Waveshare 1.8 AMOLED v2
;
[env:waveshare_esp32s3_touch_amoled_18_v2]
build_src_filter =
  ${common.amoled_18_v2_src_filter}

build_flags =
  ${env.build_flags}
  ${common.usb_msc_build_flags}
  -DRSVP_AMOLED_18_VERSION_HEADER=\"platforms/waveshare_amoled_18/v2/WaveshareAmoled18Version.h\"
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_18/BoardConfig.h\"

build_unflags =
  ${env.build_unflags}
  ${common.usb_msc_build_unflags}

;
; Waveshare 2.06 AMOLED
;
[env:waveshare_esp32s3_touch_amoled_206]
build_src_filter =
  ${common.amoled_206_src_filter}

build_flags =
  ${env.build_flags}
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_206/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=0

;
; Waveshare 2.16 AMOLED
;
[env:waveshare_esp32s3_touch_amoled_216]
build_src_filter =
  ${common.amoled_216_src_filter}

build_flags =
  ${env.build_flags}
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_216/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=0

;
; Waveshare ESP32-C6 Touch LCD 1.47
;
[env:waveshare_esp32c6_touch_lcd_147]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/3.3.9/esp32-core-3.3.9.tar.xz
  framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.3.9/esp32-core-3.3.9-libs.tar.xz
board = waveshare_esp32c6_touch_lcd_147
framework = arduino
build_src_filter =
  ${common.c6_touch_lcd_147_src_filter}

build_flags =
  ${common.base_build_flags}
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_c6_touch_lcd_147/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=0
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=0
  -DRSVP_MAX_BOOK_WORDS=6000

build_unflags =
  ${common.base_build_unflags}
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1

;
; Benchmarks
;
[env:benchmark_waveshare_esp32s3]
extends = env:waveshare_esp32s3

build_src_filter =
  ${env:waveshare_esp32s3.build_src_filter}
  +<benchmark/**>

build_flags =
  ${env:waveshare_esp32s3.build_flags}
  ${common.benchmark_build_flags}

monitor_filters =
  ${common.benchmark_monitor_filters}

[env:benchmark_waveshare_esp32s3_rev2]
extends = env:waveshare_esp32s3_rev2

build_src_filter =
  ${env:waveshare_esp32s3_rev2.build_src_filter}
  +<benchmark/**>

build_flags =
  ${env:waveshare_esp32s3_rev2.build_flags}
  ${common.benchmark_build_flags}

monitor_filters =
  ${common.benchmark_monitor_filters}

[env:benchmark_waveshare_esp32s3_touch_amoled_18_v1]
extends = env:waveshare_esp32s3_touch_amoled_18_v1

build_src_filter =
  ${env:waveshare_esp32s3_touch_amoled_18_v1.build_src_filter}
  +<benchmark/**>

build_flags =
  ${env:waveshare_esp32s3_touch_amoled_18_v1.build_flags}
  ${common.benchmark_build_flags}

monitor_filters =
  ${common.benchmark_monitor_filters}

;
; Backward-compatible alias for the AMOLED 1.8 v1 benchmark target.
;
[env:benchmark_waveshare_esp32s3_touch_amoled_18]
extends = env:benchmark_waveshare_esp32s3_touch_amoled_18_v1

[env:benchmark_waveshare_esp32s3_touch_amoled_18_v2]
extends = env:waveshare_esp32s3_touch_amoled_18_v2

build_src_filter =
  ${env:waveshare_esp32s3_touch_amoled_18_v2.build_src_filter}
  +<benchmark/**>

build_flags =
  ${env:waveshare_esp32s3_touch_amoled_18_v2.build_flags}
  ${common.benchmark_build_flags}

monitor_filters =
  ${common.benchmark_monitor_filters}

[env:benchmark_waveshare_esp32s3_touch_amoled_206]
extends = env:waveshare_esp32s3_touch_amoled_206

build_src_filter =
  ${env:waveshare_esp32s3_touch_amoled_206.build_src_filter}
  +<benchmark/**>

build_flags =
  ${env:waveshare_esp32s3_touch_amoled_206.build_flags}
  ${common.benchmark_build_flags}

monitor_filters =
  ${common.benchmark_monitor_filters}

[env:benchmark_waveshare_esp32s3_touch_amoled_216]
extends = env:waveshare_esp32s3_touch_amoled_216

build_src_filter =
  ${env:waveshare_esp32s3_touch_amoled_216.build_src_filter}
  +<benchmark/**>

build_flags =
  ${env:waveshare_esp32s3_touch_amoled_216.build_flags}
  ${common.benchmark_build_flags}

monitor_filters =
  ${common.benchmark_monitor_filters}

[env:benchmark_waveshare_esp32s3_touch_amoled_241]
extends = env:waveshare_esp32s3_touch_amoled_241

build_src_filter =
  ${env:waveshare_esp32s3_touch_amoled_241.build_src_filter}
  +<benchmark/**>

build_flags =
  ${env:waveshare_esp32s3_touch_amoled_241.build_flags}
  ${common.benchmark_build_flags}

monitor_filters =
  ${common.benchmark_monitor_filters}

;
; Native unit tests
;
[env:native_test]
platform = native
framework =
test_framework = unity
test_filter = test_pacing
test_build_src = yes

build_src_filter =
  -<*>
  +<reader/ReadingLoop.cpp>

build_flags =
  -std=gnu++17
  -Itest/support
  -Isrc
