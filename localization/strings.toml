# RSVP Nano localization source.
# Edit this file, then run tools/generate_localization.py.
# Keep ascii_only=true until the firmware font/rendering path supports accented glyphs reliably.
schema_version = 1
default_language = "English"
ascii_only = false
language_order = [
	"English",
	"Spanish",
	"French",
	"German",
	"Romanian",
	"Polish",
	"Russian",
]

[languages.English]
code = "en"
name = "English"

[languages.Spanish]
code = "es"
name = "Espanol"

[languages.French]
code = "fr"
name = "Francais"

[languages.German]
code = "de"
name = "Deutsch"

[languages.Romanian]
code = "ro"
name = "Romana"

[languages.Polish]
code = "pl"
name = "Polski"

[languages.Russian]
code = "ru"
name = "Русский"

